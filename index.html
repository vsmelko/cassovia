<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Cassovia recepty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260717-13">
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">Cassovia</p>
          <h1>Prepočet jedál a surovín</h1>
        </div>
        <div class="stats" id="stats">Načítavam dáta...</div>
      </section>

      <section class="search-panel">
        <label for="recipeSearch">Jedlo</label>
        <input id="recipeSearch" type="search" autocomplete="off" placeholder="Začni písať názov jedla alebo číslo receptu">
        <div class="search-actions">
          <button id="openRecipeForm" type="button" class="primary-action">Nový recept</button>
        </div>
        <div class="result-count" id="resultCount"></div>
        <div class="results" id="results"></div>
      </section>

      <section class="recipe-editor-panel" id="recipeEditor" hidden>
        <div class="recipe-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="recipeFormTitle">
          <div class="panel-heading">
            <h2 id="recipeFormTitle">Nový recept</h2>
            <button id="cancelRecipeEdit" type="button">Zavrieť</button>
          </div>
          <form id="recipeForm" class="recipe-form">
            <input id="recipeId" type="hidden">
            <div class="recipe-fields">
              <label>
                <span>Názov receptu</span>
                <input id="recipeName" type="text" autocomplete="off" required>
              </label>
            <label>
              <span>Strana</span>
              <input id="recipeCode" type="text" autocomplete="off">
            </label>
          </div>
            <div class="ingredients-heading">
              <span>Suroviny</span>
              <button id="addIngredient" type="button">Pridať surovinu</button>
            </div>
            <div class="ingredient-grid-head">
              <span>Surovina</span>
              <span>Množstvo na 1 porciu</span>
              <span>Jednotka</span>
              <span></span>
            </div>
            <div id="ingredientRows" class="ingredient-rows"></div>
            <div class="form-actions">
              <button type="submit" class="primary-action">Uložiť recept</button>
            </div>
          </form>
        </div>
      </section>

      <section class="workspace">
        <div class="selected-panel">
          <div class="panel-heading">
            <h2>Jedlá a počty ľudí</h2>
            <button id="clearAll" type="button">Vyčistiť</button>
          </div>
          <div class="selected-list" id="selectedList"></div>
        </div>

        <div class="shopping-panel">
          <div class="panel-heading">
            <h2>Celkové množstvá surovín</h2>
            <div class="panel-actions">
              <button id="printList" type="button">Uložiť do PDF</button>
              <button id="excelList" type="button">Uložiť do Excelu</button>
            </div>
          </div>
          <div class="export-summary" id="exportSummary"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Potravina</th>
                  <th>Množstvo</th>
                  <th>Jednotka</th>
                </tr>
              </thead>
              <tbody id="shoppingBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="data/recipes.js?v=20260717-13"></script>
    <script src="app.js?v=20260717-13"></script>
  </body>
</html>
